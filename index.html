<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdRules - 广告拦截规则</title>
    <meta name="description" content="适用于中文地区的广告拦截规则列表" >
    <link rel="icon" href="https://iTaoPu.Github.io/iCloud/Fried.png" />
    <script data-cfasync="false" src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/remarkable/2.0.1/remarkable.min.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background-color: rgba(107, 114, 128, 0.5); }
        .modal-open { overflow: hidden; }
        .tool-content-inner h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
        .tool-content-inner a { color: #4f46e5; text-decoration: underline; font-weight: 500; }
        .dark .tool-content-inner a { color: #a5b4fc; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 antialiased transition-colors duration-300">

    <button id="theme-toggle" type="button" class="fixed top-4 right-4 z-50 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 focus:outline-none focus:ring-4 focus:ring-slate-200 dark:focus:ring-slate-700 rounded-lg text-sm p-2.5 transition-all">
        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 5.05a1 1 0 00-1.414 1.414l.707.707a1 1 0 001.414-1.414l-.707-.707zM3 11a1 1 0 100 2h1a1 1 0 100-2H3zM2.05 14.95a1 1 0 011.414 0l.707-.707a1 1 0 111.414 1.414l-.707.707a1 1 0 01-1.414 0zM14.95 2.05a1 1 0 010 1.414l.707.707a1 1 0 011.414-1.414l-.707-.707a1 1 0 01-1.414 0z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
    </button>
    
    <div class="flex flex-col min-h-screen">
        <div class="flex-grow w-full max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <header class="text-center mb-10">
                <h1 class="text-4xl sm:text-5xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400">AdRules</h1>
                <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">适用于中文地区的广告拦截规则列表</p>
                <div class="flex justify-center items-center space-x-2 mt-6">
                    <img src="https://img.shields.io/github/stars/Cats-Team/AdRules?style=flat-square&color=yellow" alt="Stars">
                    <img src="https://img.shields.io/github/last-commit/cats-team/adrules/main?style=flat-square&color=red" alt="Last commit">
                    <img src="https://img.shields.io/github/license/Cats-Team/AdRules?style=flat-square" alt="License">
                </div>
            </header>

            <main class="bg-white dark:bg-slate-800/50 rounded-2xl shadow-lg p-6 sm:p-8">
                <div class="mb-8">
                    <label class="block text-center text-lg font-semibold mb-4">选择你的工具：</label>
                    <div id="custom-select" class="relative max-w-md mx-auto">
                        <button id="select-button" type="button" class="flex items-center justify-between w-full px-5 py-3 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            <span id="select-label" class="text-slate-500">点击选择...</span>
                            <svg class="w-5 h-5 text-gray-400 transform transition-transform" id="select-arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                        </button>
                        <div id="options-container" class="absolute z-10 w-full mt-2 bg-white dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-lg shadow-xl overflow-hidden transition-all duration-200 opacity-0 invisible -translate-y-2"></div>
                    </div>
                </div>
                <div id="content-area" class="min-h-[200px]"></div>
            </main>
        </div>
        
        <footer class="w-full mt-auto pt-8 pb-8 border-t border-slate-200 dark:border-slate-700 text-center text-slate-500">
            <p id="ciallo-trigger" class="text-2xl mb-4 cursor-pointer hover:text-indigo-500 transition-colors">Ciallo～(∠・ω&lt; )⌒☆</p>
             <div class="mt-2 text-sm">© 2022-<span id="current-year"></span> 蜂巢·隱曜</div>
        </footer>
    </div>

    <div id="toast-notification" class="fixed top-5 right-5 z-50 hidden items-center w-full max-w-xs p-4 text-gray-500 bg-white rounded-lg shadow-lg dark:text-gray-300 dark:bg-slate-800">
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg dark:bg-green-800"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg></div>
        <div class="ml-3 text-sm font-normal">链接已成功复制！</div>
    </div>

    <div id="ciallo-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-60 transition-opacity opacity-0 invisible">
        <div id="ciallo-modal-panel" class="w-full max-w-sm p-6 bg-white dark:bg-slate-800 shadow-xl rounded-2xl transform opacity-0 scale-95 transition-all text-center">
             <h3 class="text-2xl font-bold dark:text-white">Ciallo～(∠・ω&lt; )⌒☆</h3>
             <button id="ciallo-modal-close" class="mt-6 px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">OK</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const md = new remarkable.Remarkable({ html: true });

            const toolsData = {
                '浏览器与应用': [
                    { id: 'adge', name: '浏览器扩展 (uBO/AdGuard)', addable: true, content: '### AdGuard 浏览器扩展 / uBlock Origin\n\n[AdRules AdBlock List Lite](./adblock_lite.txt)' },
                    { id: 'adgai', name: 'AdGuard 安卓/iOS', addable: true, content: '### AdGuard for Android / iOS\n\n[AdRules AdBlock List](./adblock.txt)' },
                    { id: 'adgwm', name: 'AdGuard Win/Mac', addable: true, content: '### AdGuard for Windows / Mac\n\n[AdRules AdBlock List Plus](./adblock_plus.txt)' }
                ],
                'DNS 与 代理': [
                    { id: 'adgh', name: 'AdGuard Home', content: '### AdGuard Home\n\n[AdRules DNS List](./dns.txt)' },
                    { id: 'cla', name: 'Clash / Mihomo', content: '### Clash / Mihomo\n\n[AdRules Clash Domainset](./adrules_domainset.txt)' },
                    { id: 'qx', name: 'Quantumult X', content: '### Quantumult X\n\n[AdRules QX List](./qx.conf)' },
                    { id: 'singbox', name: 'Sing-box', content: '### Sing-box\n\n[AdRules Singbox List](./adrules-singbox.srs)' }
                ]
            };

            const optionsContainer = document.getElementById('options-container');
            const selectButton = document.getElementById('select-button');
            const selectLabel = document.getElementById('select-label');
            const contentArea = document.getElementById('content-area');

            // 初始化下拉菜单
            let optionsHtml = '';
            for (const group in toolsData) {
                optionsHtml += `<div class="p-2"><div class="px-3 py-1 text-xs font-bold text-slate-400 uppercase">${group}</div>`;
                toolsData[group].forEach(tool => {
                    optionsHtml += `<div class="option-item text-slate-700 dark:text-slate-200 px-3 py-2 rounded-md hover:bg-indigo-500 hover:text-white cursor-pointer" data-value="${tool.id}" data-name="${tool.name}">${tool.name}</div>`;
                });
                optionsHtml += `</div>`;
            }
            optionsContainer.innerHTML = optionsHtml;

            const toggleDropdown = () => {
                optionsContainer.classList.toggle('invisible');
                optionsContainer.classList.toggle('opacity-0');
                optionsContainer.classList.toggle('-translate-y-2');
                document.getElementById('select-arrow').classList.toggle('rotate-180');
            };

            selectButton.addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown(); });
            document.addEventListener('click', () => { if (!optionsContainer.classList.contains('invisible')) toggleDropdown(); });

            optionsContainer.addEventListener('click', (e) => {
                const option = e.target.closest('.option-item');
                if (!option) return;
                const toolId = option.dataset.value;
                selectLabel.textContent = option.dataset.name;
                selectLabel.className = "text-slate-900 dark:text-white font-medium";
                
                let tool;
                for (const g in toolsData) { 
                    const found = toolsData[g].find(t => t.id === toolId);
                    if (found) { tool = found; break; }
                }
                if (tool) displayToolContent(tool);
            });

            function displayToolContent(tool) {
                const renderedContent = md.render(tool.content);
                // 核心修复：更正 Markdown 链接匹配正则
                const match = tool.content.match(/$.*?$$(.*?)$/);
                const fullLink = match ? new URL(match[1], window.location.href).href : '';

                const copyBtn = `<button data-action="copy" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>复制链接</button>`;
                
                const addBtn = tool.addable ? `<a href="abp:subscribe?location=${encodeURIComponent(fullLink)}&title=AdRules" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700 transition-all">直接添加</a>` : '';

                contentArea.innerHTML = `
                <div class="tool-content-wrapper opacity-0 transition-opacity duration-500" data-link="${fullLink}">
                    <div class="tool-content-inner p-6 border border-slate-200 dark:border-slate-700 rounded-lg">${renderedContent}</div>
                    <div class="mt-4 flex flex-wrap gap-3">${copyBtn}${addBtn}</div>
                </div>`;
                setTimeout(() => contentArea.querySelector('.tool-content-wrapper').classList.remove('opacity-0'), 50);
            }

            // 复制功能
            contentArea.addEventListener('click', (e) => {
                const btn = e.target.closest('button[data-action="copy"]');
                if (!btn) return;
                const link = btn.closest('.tool-content-wrapper').dataset.link;
                navigator.clipboard.writeText(link).then(() => {
                    const toast = document.getElementById('toast-notification');
                    toast.classList.replace('hidden', 'flex');
                    setTimeout(() => toast.classList.replace('flex', 'hidden'), 3000);
                });
            });

            // 主题切换
            const themeToggleBtn = document.getElementById('theme-toggle');
            const htmlEl = document.documentElement;
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                htmlEl.classList.add('dark');
            }
            themeToggleBtn.addEventListener('click', () => {
                htmlEl.classList.toggle('dark');
                localStorage.theme = htmlEl.classList.contains('dark') ? 'dark' : 'light';
            });

            // 页脚与 Modal
            document.getElementById('current-year').textContent = new Date().getFullYear();
            const modal = document.getElementById('ciallo-modal');
            document.getElementById('ciallo-trigger').onclick = () => {
                modal.classList.remove('invisible', 'opacity-0');
                document.getElementById('ciallo-modal-panel').classList.remove('opacity-0', 'scale-95');
            };
            document.getElementById('ciallo-modal-close').onclick = () => {
                modal.classList.add('invisible', 'opacity-0');
            };
        });
    </script>
</body>
</html>
