name: Update Rules
on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'script/*'
      - 'mod/*'
      - 'index.html'
      - '.github/workflows/*'

  workflow_dispatch:

  repository_dispatch:
    types:
      - Manual-Update

jobs:
  update-rules:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main
      with:
        fetch-depth: 0 # 必须获取历史记录才能正常 commit

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Update Upstream
      continue-on-error: false
      run: |
        pip install requests
        mkdir -p ./tmp # 确保目录存在，防止 tar 报错
        bash ./script/update_upstream.sh
        # 如果 tmp 文件夹可能为空，增加判断防止 tar 报错
        if [ "$(ls -A ./tmp)" ]; then tar -czvf archive.tar.gz ./tmp/*; else touch archive.tar.gz; fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v7 # 升级到 v7 解决 Node 24 警告
      with:
        name: archive.tar.gz
        path: archive.tar.gz

    - name: Build Rules
      continue-on-error: false
      run: |
        bash ./script/update_content.sh
        bash ./script/update_dns.sh
        rm -f archive.tar.gz

    - name: Update other rules
      run: |
        mkdir -p rules
        cd rules
        rm -f *.txt
        wget -q https://raw.githubusercontent.com/damengzhu/banad/main/jiekouAD.txt || echo "Download failed"
        cd ../

    - name: Git push assets to Github
      run: |
        git config --local user.name "actions"
        git config --local user.email "action@github.com"
        
        # 稳健的提交逻辑：仅添加生成的文件，不使用 git init 重新初始化
        git add *.{conf,txt,list,html,json,srs,mrs} rules/* mod/* || echo "No files to add"
        
        # 关键修复：检查是否有变更，没有变更则跳过 commit，防止 exit code 1
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update at $(TZ=UTC-8 date +"%Y-%m-%d %H:%M")"
          git push origin main
        fi

    - name: Auto Build
      continue-on-error: true
      run: |
        # 检查 CF_TOKEN 是否存在后再执行，防止空变量报错
        if [ -n "${{ secrets.CF_TOKEN }}" ]; then
          curl -X POST "${{ secrets.CF_TOKEN }}"
        fi

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 2
        keep_minimum_runs: 5
