name: Update Rules
on:
  schedule:
    - cron: '0 */8 * * *'
  push:
    paths:
      - 'script/*'
      - 'mod/*'
      - 'index.html'
      - '.github/workflows/*'
  workflow_dispatch:
  repository_dispatch:
    types:
      - Manual-Update

permissions:
  contents: write
  actions: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Update Upstream
      run: |
        bash ./script/update_upstream.sh
        tar -czvf archive.tar.gz ./tmp/*
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: archive.tar.gz
        path: archive.tar.gz
    
    - name: Build Rules
      run: |
        bash ./script/update_content.sh
        bash ./script/update_dns.sh
    
    - name: Update other rules
      run: |
        mkdir -p rules
        cd rules
        wget -q https://raw.githubusercontent.com/damengzhu/banad/main/jiekouAD.txt
        # Validate download
        if [ ! -s jiekouAD.txt ]; then
          echo "Downloaded file is empty"
          exit 1
        fi
    
    - name: Commit and push changes
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add -A
        git commit -m "Update at $(date +'%Y-%m-%d %H:%M %Z')" || echo "No changes to commit"
        git push
    
    - name: Cleanup workflow runs
      if: success()
      uses: actions/delete-workflow-runs@v2  # Consider GitHub's official action
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 2
        keep_minimum_runs: 5
