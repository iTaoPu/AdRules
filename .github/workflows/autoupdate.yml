name: Update Rules
on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'script/*'
      - 'mod/*'
      - 'index.html'
      - '.github/workflows/*'

  workflow_dispatch:

  repository_dispatch:
    types:
      - Manual-Update

jobs:
  update-rules:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main
      with:
        fetch-depth: 0 # 获取完整历史以确保推送顺利

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Update Upstream
      continue-on-error: false
      run: |
        pip install requests
        mkdir -p ./tmp # 确保目录存在，防止 tar 找不到文件报错
        bash ./script/update_upstream.sh
        tar -czvf archive.tar.gz ./tmp/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v7 # 升级至 v7 适配 Node.js 24
      with:
        name: archive.tar.gz
        path: archive.tar.gz

    - name: Build Rules
      continue-on-error: false
      run: |
        bash ./script/update_content.sh
        bash ./script/update_dns.sh
        rm -f archive.tar.gz

    - name: Update other rules
      run: |
        mkdir -p rules
        cd rules
        rm -f *.txt
        wget https://raw.githubusercontent.com/damengzhu/banad/main/jiekouAD.txt || echo "Download failed"
        cd ../

    - name: Git push assets to Github
      run: |
        git config --local user.name "actions"
        git config --local user.email "action@github.com"
        # 仅添加生成的资源文件
        git add *.{conf,txt,list,html,json,srs,mrs} rules/* mod/* || echo "No files to add"
        # 如果没有文件变更，commit 会返回 1。使用 || exit 0 确保工作流继续
        git commit -m "Update at $(TZ=UTC-8 date +"%Y-%m-%d %H:%M")" || exit 0
        git push origin main

    - name: Auto Build
      continue-on-error: true
      run: |
        curl -X POST "${{ secrets.CF_TOKEN }}"

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 2
        keep_minimum_runs: 5
