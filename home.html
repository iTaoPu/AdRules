                    <section id="how-to-use" class="mb-20 animate-[slide-up_0.6s_ease-out_0.3s_both] scroll-mt-20">
                        <div class="text-center mb-12">
                            <h2 class="text-3xl font-bold inline-block bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400">🛠️ ${t.howTitle}</h2>
                            <p class="text-slate-500 dark:text-slate-400 mt-2">${t.howSubtitle}</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 relative">
                            <div class="hidden md:block absolute top-1/2 left-0 w-full h-0.5 bg-gradient-to-r from-indigo-300/50 via-purple-300/50 to-indigo-300/50 -translate-y-1/2 z-0"></div>
                            ${t.howSteps.map(s => `
                                <div class="relative z-10 bg-white/80 dark:bg-slate-800/60 backdrop-blur-sm rounded-2xl p-7 border border-slate-200/60 dark:border-slate-700/60 shadow-md text-center">
                                    <div class="w-12 h-12 mx-auto rounded-full bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 flex items-center justify-center text-xl font-extrabold step-number mb-4 border-2 border-indigo-200 dark:border-indigo-700/50">${s.num}</div>
                                    <h3 class="text-lg font-semibold mb-2">${s.title}</h3>
                                    <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">${s.desc}</p>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-10 text-center">
                            <a href="#" class="js-tool-selector inline-flex items-center gap-2 px-8 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/30 transition-all hover:shadow-indigo-500/50 hover:-translate-y-0.5">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.5 9.5L4 4l5.5 3.5" /></svg>
                                ${t.howCta}
                            </a>
                        </div>
                    </section>

                    <!-- 工具兼容性 -->
                    <section class="mb-20 animate-[slide-up_0.6s_ease-out_0.4s_both]">
                        <div class="bg-white/70 dark:bg-slate-800/50 backdrop-blur-sm rounded-3xl shadow-xl p-8 sm:p-10 border border-slate-200/50 dark:border-slate-700/50">
                            <h2 class="text-3xl font-bold mb-6 flex items-center gap-3"><span class="text-4xl">🔌</span> ${t.toolsTitle}</h2>
                            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                                ${t.toolsList.map(tool => `
                                    <div class="flex items-center gap-2 px-4 py-3 bg-white dark:bg-slate-700/50 rounded-xl border border-slate-200 dark:border-slate-600/50 shadow-sm">
                                        <span class="text-indigo-500 dark:text-indigo-400 text-lg">•</span> ${tool}
                                    </div>
                                `).join('')}
                            </div>
                            <p class="mt-4 text-sm text-slate-500 dark:text-slate-400">${t.toolsNote}</p>
                        </div>
                    </section>

                    <!-- 上游规则源 -->
                    <section class="mb-20 animate-[slide-up_0.6s_ease-out_0.45s_both]">
                        <div class="relative bg-white/70 dark:bg-slate-800/50 backdrop-blur-sm rounded-3xl shadow-xl p-8 sm:p-10 border border-slate-200/50 dark:border-slate-700/50 overflow-hidden">
                            <div class="absolute inset-0 upstream-glow pointer-events-none"></div>
                            <div class="absolute -top-20 -right-20 w-64 h-64 bg-indigo-200/25 dark:bg-indigo-500/8 rounded-full blur-3xl pointer-events-none"></div>
                            <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-purple-200/25 dark:bg-purple-500/8 rounded-full blur-3xl pointer-events-none"></div>
                            <div class="relative z-10">
                                <div class="flex items-center justify-between flex-wrap gap-4 mb-4">
                                    <h2 class="text-3xl font-bold flex items-center gap-3"><span class="text-4xl">📡</span> ${t.upstreamTitle}</h2>
                                    <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 text-xs font-semibold rounded-full border border-indigo-200/50 dark:border-indigo-700/30">
                                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> ${t.upstreamBadge}
                                    </span>
                                </div>
                                <div class="upstream-divider w-full my-4"></div>
                                <div class="grid grid-cols-1 md:grid-cols-5 gap-6 mt-2">
                                    <div class="md:col-span-3 space-y-3">
                                        <p class="text-lg text-slate-700 dark:text-slate-300 leading-relaxed">${t.upstreamLabel}</p>
                                        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">${t.upstreamDesc}</p>
                                        <div class="flex flex-wrap items-center gap-3 mt-1">
                                            <span class="inline-flex items-center gap-1.5 text-xs text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700/50 px-3 py-1 rounded-full">
                                                <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span> ${t.upstreamTagSync}
                                            </span>
                                            <span class="inline-flex items-center gap-1.5 text-xs text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700/50 px-3 py-1 rounded-full">
                                                <span class="w-1.5 h-1.5 rounded-full bg-purple-400"></span> ${t.upstreamTagMulti}
                                            </span>
                                            <span class="inline-flex items-center gap-1.5 text-xs text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700/50 px-3 py-1 rounded-full">
                                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> ${t.upstreamTagFree}
                                            </span>
                                        </div>
                                    </div>
                                    <div class="md:col-span-2 space-y-2.5 bg-indigo-50/60 dark:bg-indigo-900/10 rounded-xl p-5 border border-indigo-100/50 dark:border-indigo-700/20">
                                        <p class="text-xs font-semibold text-indigo-600 dark:text-indigo-400 uppercase tracking-wider">${t.upstreamIncludesTitle}</p>
                                        ${t.upstreamIncludesItems.map(item => `
                                            <div class="flex items-start gap-2.5">
                                                <span class="bullet-dot"></span>
                                                <span class="text-sm text-slate-600 dark:text-slate-300">${item}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-4">
                                    <a href="#" class="js-upstream-link btn-upstream inline-flex items-center gap-2.5 px-8 py-3.5 text-white font-semibold rounded-xl transition-all duration-300 group">
                                        <svg class="w-5 h-5 transition-transform duration-300 group-hover:rotate-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                                        ${t.upstreamCta} <span class="text-xs opacity-80 font-normal ml-1 hidden sm:inline">→</span>
                                    </a>
                                    <span class="text-xs text-slate-400 dark:text-slate-500 italic flex items-center gap-1">
                                        <span class="inline-block w-1.5 h-1.5 rounded-full bg-indigo-300 dark:bg-indigo-500/50"></span> ${t.upstreamNote}
                                    </span>
                                </div>
                                <p class="mt-5 text-xs text-center text-slate-400 dark:text-slate-500 border-t border-slate-200/50 dark:border-slate-700/50 pt-4">${t.upstreamFooter}</p>
                            </div>
                        </div>
                    </section>

                    <!-- 项目数据 -->
                    <section class="mb-20 animate-[slide-up_0.6s_ease-out_0.5s_both]">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                            ${t.stats.map(s => `
                                <div class="bg-white/80 dark:bg-slate-800/60 backdrop-blur-sm rounded-2xl p-6 border border-slate-200/60 dark:border-slate-700/60 shadow-sm">
                                    <div class="text-3xl font-extrabold text-indigo-600 dark:text-indigo-400">${s.number}</div>
                                    <div class="text-sm text-slate-500 dark:text-slate-400 mt-1">${s.label}</div>
                                </div>
                            `).join('')}
                        </div>
                    </section>

                    <!-- CTA -->
                    <section class="mb-16 animate-[slide-up_0.6s_ease-out_0.6s_both]">
                        <div class="relative overflow-hidden rounded-3xl bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-500 dark:to-purple-500 p-10 sm:p-14 text-center shadow-2xl shadow-indigo-500/20">
                            <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.3) 0%, transparent 60%), radial-gradient(circle at 70% 60%, rgba(255,255,255,0.2) 0%, transparent 50%);"></div>
                            <div class="relative z-10">
                                <h2 class="text-3xl sm:text-4xl font-extrabold text-white mb-3">${t.ctaTitle}</h2>
                                <p class="text-indigo-100 text-lg max-w-2xl mx-auto mb-6">${t.ctaDesc}</p>
                                <div class="flex flex-wrap justify-center gap-4">
                                    <a href="#" class="js-tool-selector inline-flex items-center gap-2 px-8 py-3.5 bg-white text-indigo-700 font-bold rounded-xl shadow-lg hover:shadow-xl transition-all hover:-translate-y-0.5">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                                        ${t.ctaCta}
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>
                </main>
            `;

            // 2. 渲染页脚
            footerEl.innerHTML = `
                <div class="max-w-4xl mx-auto px-4">
                    <p class="text-sm text-slate-400 dark:text-slate-500">${t.footerCopyright}</p>
                    <p class="text-xs text-slate-400/70 dark:text-slate-500/70 mt-1">${t.footerLicense}</p>
                </div>
            `;

            // 3. 更新年份
            const yearSpan = footerEl.querySelector('#current-year');
            if (yearSpan) yearSpan.textContent = new Date().getFullYear();

            // 4. 更新语言按钮标签
            langLabel.textContent = lang === 'en' ? 'English' : '中文';
            document.documentElement.lang = lang;

            // 5. 重新绑定动态链接（工具选择器、上游规则）
            const origin = window.location.origin;
            document.querySelectorAll('.js-tool-selector').forEach(el => el.href = origin + '/');
            document.querySelectorAll('.js-upstream-link').forEach(el => el.href = origin + '/ulist.html');

            // 6. 外部链接安全
            document.querySelectorAll('a[href^="http"]').forEach(link => {
                if (!link.href.includes(window.location.host)) {
                    link.setAttribute('target', '_blank');
                    link.setAttribute('rel', 'noopener noreferrer');
                }
            });
        }

        // ——— 切换语言 ———
        function setLanguage(lang) {
            currentLang = lang;
            renderPage(lang);
            localStorage.setItem('adrules-lang', lang);
        }

        // ——— 主题切换（保留原逻辑） ———
        const themeToggleBtn = document.getElementById('theme-toggle');
        const htmlEl = document.documentElement;
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        function setTheme(theme) {
            if (theme === 'dark') {
                htmlEl.classList.add('dark');
                darkIcon.classList.add('hidden');
                lightIcon.classList.remove('hidden');
            } else {
                htmlEl.classList.remove('dark');
                darkIcon.classList.remove('hidden');
                lightIcon.classList.add('hidden');
            }
            localStorage.setItem('theme', theme);
        }

        const storedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const initialTheme = storedTheme || (prefersDark ? 'dark' : 'light');
        setTheme(initialTheme);

        themeToggleBtn.addEventListener('click', function() {
            const isDark = htmlEl.classList.contains('dark');
            setTheme(isDark ? 'light' : 'dark');
        });

        // ——— 语言切换事件 ———
        langToggleBtn.addEventListener('click', function() {
            const nextLang = currentLang === 'en' ? 'zh' : 'en';
            setLanguage(nextLang);
        });

        // ——— 初始化（默认英文，保留用户选择） ———
        const storedLang = localStorage.getItem('adrules-lang');
        const initialLang = storedLang || 'en';
        setLanguage(initialLang);

    });
</script>
</body>
</html>
